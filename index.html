<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Notificaciones Push</title>
    <script type="module" src="js/lib/manejaErrores.js"></script>
  </head>

  <body>
    <h1>Notificaciones Push</h1>
    <menu style="display: flex; list-style: none; flex-wrap: wrap; gap: 0.5rem">
      <li>
        <button id="btnSuscribe" type="button" hidden>Suscríbete</button>
      </li>
      <li>
        <button id="btnCancela" type="button" hidden>
          Cancela suscripción
        </button>
      </li>
      <li>
        <a href="php/genera-llaves.php" target="_blank">Genera llaves</a>
      </li>
    </menu>

    <p>
      <output id="outEstado">
        <progress max="100">Cargando&hellip;</progress>
      </output>
    </p>

    <fieldset>
      <legend>Mensaje de notificación</legend>
      <textarea id="txtMensaje" rows="4" cols="50"></textarea>
      <div style="margin-top: 0.5rem">
        <button id="btnNotifica" type="button">Notifica</button>
        <output id="outNotifica"></output>
      </div>
    </fieldset>

    <script type="module">
      import { activaNotificacionesPush } from "./js/lib/activaNotificacionesPush.js";
      import { getSuscripcionPush } from "./js/lib/getSuscripcionPush.js";
      import { suscribeAPush } from "./js/lib/suscribeAPush.js";
      import { cancelaSuscripcionPush } from "./js/lib/cancelaSuscripcionPush.js";

      import { urlBase64ToUint8Array } from "./js/lib/urlBase64ToUint8Array.js";
      import { calculaDtoParaSuscripcion } from "./js/lib/calculaDtoParaSuscripcion.js";
      import { consume } from "./js/lib/consume.js";
      import { enviaJsonRecibeJson } from "./js/lib/enviaJsonRecibeJson.js";
      import { descargaVista } from "./js/lib/descargaVista.js";
      import { muestraError } from "./js/lib/muestraError.js";

      const applicationServerKey = urlBase64ToUint8Array(
        "BNFrp97cZ7TdAs6_9xT0vb8zxRWS8K9fCxtWG9U9aKumdRArY0xO0cF4Filg_SvxPnKQViDWG7i_5dl-X5oO92U",
      );
      /** @enum {string} */
      const Estado = {
        CALCULANDO: "Calculando…",
        SUSCRITO: "Suscrito",
        DESUSCRITO: "Sin suscripción",
        INCOMPATIBLE: "Incompatible",
      };

      // ------------------------------------------------------------------
      // Componente: EstadoSuscripcion
      // Controla el <output id="outEstado"> y visibilidad de los botones.
      // ------------------------------------------------------------------
      const ComponenteEstadoSuscripcion = {
        /** @param {Estado} estado */
        muestra(estado) {
          outEstado.value = estado;
          if (estado === Estado.INCOMPATIBLE || estado === Estado.CALCULANDO) {
            btnSuscribe.hidden = true;
            btnCancela.hidden = true;
            btnNotifica.hidden = true;
          } else if (estado === Estado.SUSCRITO) {
            btnSuscribe.hidden = true;
            btnCancela.hidden = false;
            btnNotifica.hidden = false;
          } else if (estado === Estado.DESUSCRITO) {
            btnSuscribe.hidden = false;
            btnCancela.hidden = true;
            btnNotifica.hidden = true;
          }
        },
      };

      // ------------------------------------------------------------------
      // Componente: Suscripcion
      // Maneja alta, baja y sincronización inicial de la suscripción push.
      // ------------------------------------------------------------------
      const ComponenteSuscripcion = {
        async init() {
          try {
            await activaNotificacionesPush("sw.js");
            const suscripcion = await getSuscripcionPush();
            if (suscripcion === null) {
              ComponenteEstadoSuscripcion.muestra(Estado.DESUSCRITO);
            } else {
              const dto = calculaDtoParaSuscripcion(suscripcion);
              await consume(
                enviaJsonRecibeJson("php/suscripcion-modifica.php", dto),
              );
              ComponenteEstadoSuscripcion.muestra(Estado.SUSCRITO);
            }
          } catch (error) {
            ComponenteEstadoSuscripcion.muestra(Estado.INCOMPATIBLE);
            muestraError(error);
          }
        },

        async suscribe() {
          ComponenteEstadoSuscripcion.muestra(Estado.CALCULANDO);
          const suscripcion = await suscribeAPush(applicationServerKey);
          // Agrega la suscripción al servidor,
          const dto = calculaDtoParaSuscripcion(suscripcion);
          await consume(
            enviaJsonRecibeJson("php/suscripcion-modifica.php", dto),
          );
          ComponenteEstadoSuscripcion.muestra(Estado.SUSCRITO);
        },

        async cancela() {
          ComponenteEstadoSuscripcion.muestra(Estado.CALCULANDO);
          const suscripcion = await cancelaSuscripcionPush();
          if (suscripcion !== null) {
            // Elimina la suscripción en el servidor,
            const dto = calculaDtoParaSuscripcion(suscripcion);
            await consume(
              enviaJsonRecibeJson("php/suscripcion-elimina.php", dto),
            );
            ComponenteEstadoSuscripcion.muestra(Estado.DESUSCRITO);
          }
        },
      };

      // ------------------------------------------------------------------
      // Componente: Notificacion
      // Maneja el textarea y el envío de notificaciones personalizadas.
      // El reporte de envío a endpoints ya no se muestra en la vista;
      // solo se indica éxito o error mínimo en el <output id="outNotifica">.
      // ------------------------------------------------------------------
      const ComponenteNotificacion = {
        async envia() {
          outNotifica.value = "Enviando…";
          btnNotifica.disabled = true;
          const mensaje = txtMensaje.value;
          try {
            await consume(enviaJsonRecibeJson("php/notifica.php", { mensaje }));
            outNotifica.value = "Notificación enviada";
          } catch (error) {
            outNotifica.value = "";
            muestraError(error);
          } finally {
            btnNotifica.disabled = false;
          }
        },
      };

      // ------------------------------------------------------------------
      // Arranque de la vista y enlace de eventos.
      // ------------------------------------------------------------------
      ComponenteSuscripcion.init();
      btnSuscribe.addEventListener("click", () =>
        ComponenteSuscripcion.suscribe(),
      );
      btnCancela.addEventListener("click", () =>
        ComponenteSuscripcion.cancela(),
      );
      btnNotifica.addEventListener("click", () =>
        ComponenteNotificacion.envia(),
      );
    </script>
  </body>
</html>
